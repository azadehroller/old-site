{% require_js %}
<script>
(function() {
// Check if Intersection Observer is supported
if (!('IntersectionObserver' in window)) {
  // Fallback: show all elements if Intersection Observer is not supported
  document.querySelectorAll('.fade-in-on-scroll').forEach(function(el) {
    el.classList.add('is-visible');
  });
  return;
}

// Create Intersection Observer
const observerOptions = {
  root: null, // Use viewport as root
  rootMargin: '0px',
  threshold: 0.1 // Trigger when 10% of element is visible
};

const observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      // Element is in view, add visible class
      entry.target.classList.add('is-visible');
      // Optionally unobserve after it's been shown (for performance)
      observer.unobserve(entry.target);
    }
  });
}, observerOptions);

// Initialize observer when DOM is ready
function initObserver() {
  const elementsToObserve = document.querySelectorAll('.fade-in-on-scroll');
  elementsToObserve.forEach(function(element) {
    observer.observe(element);
  });
}

// Handle both cases: DOM already loaded or still loading
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initObserver);
} else {
  initObserver();
}
})();
</script>
