<div class="pulse-report-heading">
  <header class="flex flex-col items-center justify-center text-center px-4">
    <div class="fade-in-up">
      {% if module.badge_text %}
        <p class="inline-block text-sm font-semibold text-purple-300 tracking-widest border-2 border-purple-400 px-6 py-2 rounded-full">
          {{ module.badge_text }}
        </p>
      {% endif %}
      
      {% if module.main_title %}
        <h1 class="text-5xl md:text-7xl font-bold mt-4 leading-tight">
          {{ module.main_title }}
        </h1>
      {% endif %}
      
      {% if module.subtitle %}
        <p class="mt-6 text-lg text-gray-300">
          {{ module.subtitle }}
        </p>
      {% endif %}
      
      {% if module.button_text %}
        <a href="{{ module.button_link.url.href }}" 
           class="inline-block mt-8 px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-full transition-transform duration-300 hover:scale-105">
          {{ module.button_text }}
        </a>
      {% endif %}
    </div>
  </header>
</div>
