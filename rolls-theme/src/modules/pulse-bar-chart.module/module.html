<div class="pulse-bar-chart card chart-card fade-in-up">
  <h3 class="font-semibold mb-4 flex items-center">
    <span class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-purple-900/50 mr-3">
      <svg class="w-5 h-5 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
      </svg>
    </span>
    {{ module.chart_title }}
  </h3>
  
  <div class="h-64 flex items-end justify-around space-x-2 chart-container">
    {% for item in module.data_items %}
      <div class="flex flex-col items-center" style="width: {{ 100 / module.data_items|length }}%;">
        <div class="w-full h-48 flex items-end">
          <div class="bar chart-element bg-purple-500 hover:bg-purple-400 w-full rounded-t-md" 
               style="height: {{ item.value }}%;"
               {% if item.tooltip %}data-tooltip="{{ item.tooltip }}"{% endif %}></div>
        </div>
        <p class="text-xs mt-2 text-gray-400">{{ item.item_label }}</p>
        {% if module.show_percentage %}
          <p class="text-xs font-semibold">{{ item.value }}%</p>
        {% endif %}
      </div>
    {% endfor %}
  </div>
</div>
