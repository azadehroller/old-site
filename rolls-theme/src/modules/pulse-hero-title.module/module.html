<div class="pulse-hero-title relative z-10 text-center {% if module.enable_animation %}animated{% endif %}" 
     data-aos="fade-up" data-aos-delay="400">
  
  <h1 class="pulse-hero-title__main text-5xl lg:text-7xl xl:text-8xl font-black mb-6 leading-tight">
    {% if module.animation_type == 'typewriter' %}
      <span class="typewriter-text bg-gradient-to-r from-white via-cyan-100 to-white bg-clip-text text-transparent 
                   drop-shadow-2xl" data-text="{{ module.title }}">{{ module.title }}</span>
    {% else %}
      <span class="bg-gradient-to-r from-white via-cyan-100 to-white bg-clip-text text-transparent 
                   drop-shadow-2xl">{{ module.title }}</span>
    {% endif %}
  </h1>
  
  {% if module.subtitle %}
    <p class="pulse-hero-title__sub text-xl lg:text-2xl text-cyan-100/90 max-w-4xl mx-auto leading-relaxed 
              font-light tracking-wide">
      {{ module.subtitle }}
    </p>
  {% endif %}
</div>

{% if module.animation_type == 'typewriter' %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const typewriterElement = document.querySelector('.typewriter-text');
  if (typewriterElement) {
    const text = typewriterElement.getAttribute('data-text');
    typewriterElement.textContent = '';
    
    let i = 0;
    function typeWriter() {
      if (i < text.length) {
        typewriterElement.textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, 100);
      }
    }
    
    setTimeout(() => {
      typeWriter();
    }, 800);
  }
});
</script>
{% endif %}
