<div class="pulse-radar-chart card chart-card fade-in-up chart-container">
  <h3 class="font-semibold mb-4 flex items-center">
    {% if module.chart_icon.name %}
      <span class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-purple-900/50 mr-3">
        {% icon name="{{ module.chart_icon.name }}" style="{{ module.chart_icon.type }}" %}
      </span>
    {% endif %}
    {{ module.chart_title }}
  </h3>
  
  <div class="radar-chart-wrapper">
    <!-- Radar Chart Container -->
    <div class="radar-chart-container relative" data-axes-count="{{ module.axes|length }}">
      <svg class="radar-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <!-- Background grid will be generated by JavaScript -->
        <g class="radar-grid"></g>
        
        <!-- Data series will be generated by JavaScript -->
        <g class="radar-data"></g>
        
        <!-- Axis hover zones will be generated by JavaScript -->
        <g class="radar-hover-zones"></g>
        
        <!-- Axis labels will be generated by JavaScript -->
        <g class="radar-labels"></g>
      </svg>
      
      <!-- Hidden data for JavaScript -->
      <script type="application/json" class="radar-config">
      {
        "axes": [
          {% for axis in module.axes %}
          {
            "label": "{{ axis.axis_label|escape }}",
            "max_value": {{ axis.max_value or 5 }}
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ],
        "datasets": [
          {% for dataset in module.datasets %}
          {
            "label": "{{ dataset.series_label|escape }}",
            "color": "{{ dataset.series_color }}",
            "values": "{{ dataset.values }}"
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ],
        "show_legend": {{ module.show_legend|lower }}
      }
      </script>
      
      <!-- Tooltip element -->
      <div class="radar-tooltip" id="radar-tooltip-{{ name }}"></div>
    </div>
    
    <!-- Legend -->
    {% if module.show_legend %}
      <div class="radar-legend mt-6">
        {% for dataset in module.datasets %}
          <div class="legend-item flex items-center cursor-pointer hover:opacity-80 transition-opacity" 
               data-series="{{ loop.index0 }}"
               data-tooltip="Click to toggle {{ dataset.series_label }} visibility">
            <span class="w-4 h-4 rounded mr-3" style="background-color: {{ dataset.series_color }};"></span>
            <span class="text-sm">{{ dataset.series_label }}</span>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>

<script>
(function() {
  const moduleId = 'radar-{{ name }}';
  if (window[moduleId + '_initialized']) return;
  window[moduleId + '_initialized'] = true;
  
  document.addEventListener('DOMContentLoaded', function() {
    const container = document.querySelector('#radar-tooltip-{{ name }}').parentElement.parentElement;
    const svg = container.querySelector('.radar-svg');
    const configScript = container.querySelector('.radar-config');
    const tooltip = document.getElementById('radar-tooltip-{{ name }}');
    
    let config;
    try {
      config = JSON.parse(configScript.textContent);
    } catch (e) {
      console.error('Failed to parse radar chart config:', e);
      return;
    }
    
    const centerX = 200;
    const centerY = 200;
    const radius = 150;
    const numAxes = config.axes.length;
    const gridLevels = 5;
    
    let visibleSeries = new Set();
    
    // Initialize all series as visible
    config.datasets.forEach((_, index) => {
      visibleSeries.add(index);
    });
    
    // Helper function to calculate point coordinates
    function getPointCoords(axisIndex, value, maxValue) {
      const angle = (axisIndex * 2 * Math.PI) / numAxes - Math.PI / 2;
      const scale = Math.min(value / maxValue, 1) * radius;
      return {
        x: centerX + scale * Math.cos(angle),
        y: centerY + scale * Math.sin(angle)
      };
    }
    
    // Helper function to get axis label position
    function getLabelCoords(axisIndex) {
      const angle = (axisIndex * 2 * Math.PI) / numAxes - Math.PI / 2;
      const labelRadius = radius + 30;
      return {
        x: centerX + labelRadius * Math.cos(angle),
        y: centerY + labelRadius * Math.sin(angle)
      };
    }
    
    // Create grid
    function createGrid() {
      const gridGroup = svg.querySelector('.radar-grid');
      
      // Create concentric polygons
      for (let level = 1; level <= gridLevels; level++) {
        const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        const points = [];
        const scale = level / gridLevels;
        
        for (let i = 0; i < numAxes; i++) {
          const coords = getPointCoords(i, scale, 1);
          points.push(`${coords.x},${coords.y}`);
        }
        
        polygon.setAttribute('points', points.join(' '));
        polygon.setAttribute('fill', 'none');
        polygon.setAttribute('stroke', 'rgba(255, 255, 255, 0.1)');
        polygon.setAttribute('stroke-width', '1');
        polygon.classList.add('grid-line');
        gridGroup.appendChild(polygon);
      }
      
      // Create axis lines
      for (let i = 0; i < numAxes; i++) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const coords = getPointCoords(i, 1, 1);
        
        line.setAttribute('x1', centerX);
        line.setAttribute('y1', centerY);
        line.setAttribute('x2', coords.x);
        line.setAttribute('y2', coords.y);
        line.setAttribute('stroke', 'rgba(255, 255, 255, 0.1)');
        line.setAttribute('stroke-width', '1');
        line.classList.add('axis-line');
        gridGroup.appendChild(line);
      }
    }
    
    // Create data series
    function createDataSeries() {
      const dataGroup = svg.querySelector('.radar-data');
      
      config.datasets.forEach((dataset, seriesIndex) => {
        const values = dataset.values.split(',').map(v => parseFloat(v.trim()));
        
        // Create series group
        const seriesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        seriesGroup.classList.add('radar-series');
        seriesGroup.setAttribute('data-series', seriesIndex);
        
        // Create polygon
        const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        const points = [];
        
        for (let i = 0; i < Math.min(values.length, numAxes); i++) {
          const coords = getPointCoords(i, values[i], config.axes[i].max_value);
          points.push(`${coords.x},${coords.y}`);
        }
        
        polygon.setAttribute('points', points.join(' '));
        polygon.setAttribute('fill', dataset.color + '20');
        polygon.setAttribute('stroke', dataset.color);
        polygon.setAttribute('stroke-width', '2');
        polygon.classList.add('radar-polygon');
        seriesGroup.appendChild(polygon);
        
        // Create points
        for (let i = 0; i < Math.min(values.length, numAxes); i++) {
          const coords = getPointCoords(i, values[i], config.axes[i].max_value);
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          
          circle.setAttribute('cx', coords.x);
          circle.setAttribute('cy', coords.y);
          circle.setAttribute('r', '4');
          circle.setAttribute('fill', dataset.color);
          circle.setAttribute('stroke', '#fff');
          circle.setAttribute('stroke-width', '2');
          circle.classList.add('radar-point');
          circle.setAttribute('data-tooltip', `${dataset.label}: ${values[i]}/${config.axes[i].max_value} ${config.axes[i].label}`);
          circle.setAttribute('data-series', seriesIndex);
          circle.setAttribute('data-point', i);
          
          seriesGroup.appendChild(circle);
        }
        
        dataGroup.appendChild(seriesGroup);
      });
    }
    
    // Create axis hover zones
    function createHoverZones() {
      const hoverGroup = svg.querySelector('.radar-hover-zones');
      
      config.axes.forEach((axis, index) => {
        // Create a sector-shaped hover zone for each axis
        const angleStart = (index * 2 * Math.PI) / numAxes - Math.PI / numAxes;
        const angleEnd = ((index + 1) * 2 * Math.PI) / numAxes - Math.PI / numAxes;
        
        // Calculate sector path
        const outerRadius = radius + 20;
        const x1 = centerX + outerRadius * Math.cos(angleStart);
        const y1 = centerY + outerRadius * Math.sin(angleStart);
        const x2 = centerX + outerRadius * Math.cos(angleEnd);
        const y2 = centerY + outerRadius * Math.sin(angleEnd);
        
        const largeArcFlag = (angleEnd - angleStart) > Math.PI ? 1 : 0;
        
        const pathData = [
          `M ${centerX} ${centerY}`,
          `L ${x1} ${y1}`,
          `A ${outerRadius} ${outerRadius} 0 ${largeArcFlag} 1 ${x2} ${y2}`,
          'Z'
        ].join(' ');
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('fill', 'transparent');
        path.setAttribute('stroke', 'transparent');
        path.classList.add('axis-hover-zone');
        path.setAttribute('data-axis-index', index);
        path.style.cursor = 'pointer';
        
        hoverGroup.appendChild(path);
      });
    }
    
    // Create axis labels
    function createLabels() {
      const labelsGroup = svg.querySelector('.radar-labels');
      
      config.axes.forEach((axis, index) => {
        const coords = getLabelCoords(index);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        
        text.setAttribute('x', coords.x);
        text.setAttribute('y', coords.y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('fill', '#e0e0e0');
        text.setAttribute('font-size', '12');
        text.setAttribute('font-weight', '500');
        text.classList.add('axis-label');
        text.textContent = axis.label;
        
        labelsGroup.appendChild(text);
      });
    }
    
    // Initialize chart
    createGrid();
    createDataSeries();
    createHoverZones();
    createLabels();
    
    // Add interactions
    const radarPoints = container.querySelectorAll('.radar-point');
    const radarPolygons = container.querySelectorAll('.radar-polygon');
    const axisHoverZones = container.querySelectorAll('.axis-hover-zone');
    const legendItems = container.querySelectorAll('.legend-item');
    
    // Function to create axis comparison tooltip
    function createAxisTooltip(axisIndex) {
      const axis = config.axes[axisIndex];
      let tooltipContent = `<div class="axis-tooltip-title">${axis.label}</div>`;
      
      config.datasets.forEach((dataset, datasetIndex) => {
        const values = dataset.values.split(',').map(v => parseFloat(v.trim()));
        const value = values[axisIndex] || 0;
        const isVisible = visibleSeries.has(datasetIndex);
        const opacity = isVisible ? '1' : '0.3';
        
        tooltipContent += `
          <div class="axis-tooltip-item" style="opacity: ${opacity}">
            <span class="axis-tooltip-color" style="background-color: ${dataset.color};"></span>
            <span class="axis-tooltip-label">${dataset.label}:</span>
            <span class="axis-tooltip-value">${value}/${axis.max_value}</span>
          </div>
        `;
      });
      
      return tooltipContent;
    }
    
    // Axis hover zone interactions
    axisHoverZones.forEach((zone) => {
      zone.addEventListener('mouseenter', function(e) {
        const axisIndex = parseInt(zone.getAttribute('data-axis-index'));
        const tooltipContent = createAxisTooltip(axisIndex);
        
        if (tooltip) {
          tooltip.innerHTML = tooltipContent;
          tooltip.style.opacity = '1';
          tooltip.style.visibility = 'visible';
          
          // Position tooltip at center of chart
          const containerRect = container.getBoundingClientRect();
          const svgRect = svg.getBoundingClientRect();
          tooltip.style.left = (svgRect.left - containerRect.left + svgRect.width / 2) + 'px';
          tooltip.style.top = (svgRect.top - containerRect.top + svgRect.height / 2) + 'px';
          tooltip.style.transform = 'translate(-50%, -50%)';
        }
        
        // Highlight all points for this axis
        const axisPoints = container.querySelectorAll(`[data-point="${axisIndex}"]`);
        axisPoints.forEach(point => {
          point.setAttribute('r', '6');
          point.style.filter = 'brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,0.5))';
        });
      });
      
      zone.addEventListener('mouseleave', function() {
        if (tooltip) {
          tooltip.style.opacity = '0';
          tooltip.style.visibility = 'hidden';
          tooltip.style.transform = '';
        }
        
        // Remove highlight from all points for this axis
        const axisIndex = parseInt(zone.getAttribute('data-axis-index'));
        const axisPoints = container.querySelectorAll(`[data-point="${axisIndex}"]`);
        axisPoints.forEach(point => {
          point.setAttribute('r', '4');
          point.style.filter = '';
        });
      });
    });
    
    // Point hover interactions (keep existing for individual point tooltips)
    radarPoints.forEach((point) => {
      point.addEventListener('mouseenter', function(e) {
        // Only show individual point tooltip if not hovering over axis zone
        const axisIndex = parseInt(point.getAttribute('data-point'));
        const axisZone = container.querySelector(`[data-axis-index="${axisIndex}"]`);
        
        // Check if we're currently hovering over the axis zone
        if (!axisZone.matches(':hover')) {
          const tooltipText = point.getAttribute('data-tooltip');
          
          if (tooltipText && tooltip) {
            tooltip.innerHTML = tooltipText;
            tooltip.style.opacity = '1';
            tooltip.style.visibility = 'visible';
            
            const rect = point.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            tooltip.style.left = (rect.left - containerRect.left + 20) + 'px';
            tooltip.style.top = (rect.top - containerRect.top - 10) + 'px';
            tooltip.style.transform = '';
          }
          
          point.setAttribute('r', '6');
          point.style.filter = 'brightness(1.3)';
        }
      });
      
      point.addEventListener('mouseleave', function() {
        const axisIndex = parseInt(point.getAttribute('data-point'));
        const axisZone = container.querySelector(`[data-axis-index="${axisIndex}"]`);
        
        // Only hide tooltip and remove highlight if not hovering over axis zone
        if (!axisZone.matches(':hover')) {
          if (tooltip) {
            tooltip.style.opacity = '0';
            tooltip.style.visibility = 'hidden';
          }
          
          point.setAttribute('r', '4');
          point.style.filter = '';
        }
      });
    });
    
    // Legend interactions
    legendItems.forEach((item, index) => {
      item.addEventListener('click', function() {
        const seriesIndex = parseInt(item.getAttribute('data-series'));
        const seriesGroup = container.querySelector(`[data-series="${seriesIndex}"]`);
        
        if (visibleSeries.has(seriesIndex)) {
          visibleSeries.delete(seriesIndex);
          seriesGroup.style.opacity = '0.1';
          item.style.opacity = '0.3';
        } else {
          visibleSeries.add(seriesIndex);
          seriesGroup.style.opacity = '1';
          item.style.opacity = '1';
        }
      });
    });
    
    // Animation on scroll
    const chartObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          
          // Animate grid lines
          const gridLines = container.querySelectorAll('.grid-line');
          gridLines.forEach((line, index) => {
            setTimeout(() => {
              line.style.opacity = '1';
              line.style.transform = 'scale(1)';
            }, index * 100);
          });
          
          // Animate axis lines
          const axisLines = container.querySelectorAll('.axis-line');
          axisLines.forEach((line, index) => {
            setTimeout(() => {
              line.style.opacity = '1';
              line.style.strokeDashoffset = '0';
            }, 500 + index * 100);
          });
          
          // Animate data series
          radarPolygons.forEach((polygon, index) => {
            setTimeout(() => {
              polygon.style.opacity = '1';
              polygon.style.transform = 'scale(1)';
            }, 1000 + index * 200);
          });
          
          // Animate points
          radarPoints.forEach((point, index) => {
            setTimeout(() => {
              point.style.opacity = '1';
              point.style.transform = 'scale(1)';
            }, 1200 + index * 50);
          });
          
          // Animate labels
          const labels = container.querySelectorAll('.axis-label');
          labels.forEach((label, index) => {
            setTimeout(() => {
              label.style.opacity = '1';
              label.style.transform = 'scale(1)';
            }, 1400 + index * 100);
          });
          
          chartObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    
    const chartElement = container.closest('.pulse-radar-chart');
    if (chartElement) {
      chartObserver.observe(chartElement);
    }
  });
})();
</script>
