<div class="pulse-key-takeaways space-y-12">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for takeaway in module.takeaways %}
      <div class="takeaway-card card fade-in-up group hover:scale-105 transform transition-all duration-300 relative overflow-hidden" 
           style="background: {{ takeaway.background_gradient }}; transition-delay: {{ loop.index0 * 100 }}ms;">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r" 
             style="background: linear-gradient(to right, {{ takeaway.gradient_from }}, {{ takeaway.gradient_to }});"></div>
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="w-16 h-16 bg-gradient-to-br rounded-full flex items-center justify-center shadow-lg"
                 style="background: linear-gradient(to bottom right, {{ takeaway.gradient_from }}, {{ takeaway.gradient_to }});">
              <span class="text-2xl font-bold text-white">{{ takeaway.number }}</span>
            </div>
            <div class="text-right">
              <p class="text-4xl font-bold text-white group-hover:text-purple-300">
                <span class="counter" data-target="{{ takeaway.percentage }}">0</span>%
              </p>
            </div>
          </div>
          <h3 class="text-xl font-semibold mb-3 text-white group-hover:text-purple-200 transition-colors">
            {{ takeaway.title }}
          </h3>
          <p class="text-purple-100 group-hover:text-purple-300 leading-relaxed transition-colors">
            {{ takeaway.description }}
          </p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

<script>
(function() {
  const moduleId = 'takeaways-{{ name }}';
  if (window[moduleId + '_initialized']) return;
  window[moduleId + '_initialized'] = true;
  
  document.addEventListener('DOMContentLoaded', function() {
    // Counter animation
    const animateCounter = (counter) => {
      const target = +counter.getAttribute('data-target');
      const duration = 1500;
      const stepTime = 20;
      const steps = duration / stepTime;
      const increment = target / steps;
      let current = 0;
      
      const timer = setInterval(() => {
        current += increment;
        if (current >= target) {
          clearInterval(timer);
          counter.innerText = target;
        } else {
          counter.innerText = Math.ceil(current);
        }
      }, stepTime);
    };
    
    // Observer for animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          
          // Animate counters
          entry.target.querySelectorAll('.counter:not(.animated)').forEach((counter, index) => {
            setTimeout(() => {
              animateCounter(counter);
              counter.classList.add('animated');
            }, index * 100);
          });
          
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    
    // Observe fade-in elements
    document.querySelectorAll('.pulse-key-takeaways .fade-in-up').forEach(el => {
      observer.observe(el);
    });
    
    // Observe takeaway cards
    document.querySelectorAll('.pulse-key-takeaways .takeaway-card').forEach(el => {
      observer.observe(el);
    });
  });
})();
</script>
